name: "flake_update"

on:
  workflow_run:
    workflows: ["fetch_upstream"]
    types: [completed]

  workflow_dispatch:

jobs:
  update: # update flake.lock
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/update-flake-lock@main
        id: update
  
  test: # test building with updated source
    runs-on: ubuntu-latest
    needs: update

    steps:
      - uses: actions/checkout@v6
        with:
          ref: "update_flake_lock_action"
      - uses: cachix/install-nix-action@v31
      - run: nix build .#scroll-git
  
  merge: # merge the pull request
    runs-on: ubuntu-latest
    needs: test

    steps:
      - run: "gh pr merge --auto --merge ${{ steps.update.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ github.token }}
